workflows:
  ios-app-store:
    name: PagueMenos ML - App Store
    max_build_duration: 120
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Codemagic
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: br.com.paguemenosml.app
      vars:
        APPLE_TEAM_ID: V6PGWZ3449
      xcode: latest
      cocoapods: default
    scripts:
      - name: Remover entitlements desnecessarios
        script: |
          cd paguemenosml-ios/src
          ENTITLEMENTS="PagueMenos ML/PagueMenos ML.entitlements"
          if [ -f "$ENTITLEMENTS" ]; then
            /usr/libexec/PlistBuddy -c "Delete :com.apple.developer.associated-domains" "$ENTITLEMENTS" 2>/dev/null || true
            /usr/libexec/PlistBuddy -c "Delete :aps-environment" "$ENTITLEMENTS" 2>/dev/null || true
          fi
          sed -i '' 's/PUSH_NOTIFICATIONS = {enabled = 1;};/PUSH_NOTIFICATIONS = {enabled = 0;};/g' "PagueMenos ML.xcodeproj/project.pbxproj" 2>/dev/null || true
          sed -i '' 's/ASSOCIATED_DOMAINS = {enabled = 1;};/ASSOCIATED_DOMAINS = {enabled = 0;};/g' "PagueMenos ML.xcodeproj/project.pbxproj" 2>/dev/null || true

      - name: Install CocoaPods
        script: |
          cd paguemenosml-ios/src
          pod install

      - name: Configurar assinatura
        script: |
          cd paguemenosml-ios/src
          xcode-project use-profiles

      - name: Incrementar build number
        script: |
          cd paguemenosml-ios/src
          xcrun agvtool new-version -all $BUILD_NUMBER

      - name: Build e Archive
        script: |
          cd paguemenosml-ios/src
          xcodebuild \
            -workspace "PagueMenos ML.xcworkspace" \
            -scheme "PagueMenos ML" \
            -configuration Release \
            -archivePath $CM_BUILD_DIR/PagueMenosML.xcarchive \
            archive \
            DEVELOPMENT_TEAM=$APPLE_TEAM_ID

      - name: Exportar IPA
        script: |
          cat > /tmp/ExportOptions.plist << PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store</string>
              <key>teamID</key>
              <string>V6PGWZ3449</string>
              <key>signingStyle</key>
              <string>manual</string>
              <key>provisioningProfiles</key>
              <dict>
                  <key>br.com.paguemenosml.app</key>
                  <string>PagueMenos ML App Store</string>
              </dict>
          </dict>
          </plist>
          PLIST
          xcodebuild -exportArchive \
            -archivePath $CM_BUILD_DIR/PagueMenosML.xcarchive \
            -exportOptionsPlist /tmp/ExportOptions.plist \
            -exportPath $CM_BUILD_DIR/ipa

    artifacts:
      - $CM_BUILD_DIR/ipa/*.ipa

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false
